name: Social Media Publisher

on:
  push:
    branches: [ "main" ]
  schedule:
    # Blog Poller: Sun, Tue, Thu, Sat at 13:05 UTC
    - cron: '5 13 * * 0,2,4,6'
    # GitHub Poller: Every day at 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which source to run (github = releases)'
        type: choice
        default: all
        options: [all, blog, github]
      platforms:
        description: 'Which platforms to publish to'
        type: choice
        default: all
        options: [all, facebook, linkedin]
      dry_run:
        description: 'Generate posts but do not publish'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: allows the action to push commits back to the repo

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Project
      run: npm run build

    - name: Run SMM Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        LINKEDIN_USER_ID: ${{ secrets.LINKEDIN_USER_ID }}
        LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        TARGET_REPOS: ${{ vars.TARGET_REPOS }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Manual dispatch uses the chosen mode; the blog cron -> blog, the
        # github cron -> github; anything else (push) -> everything.
        RUN_MODE: ${{ inputs.mode || (github.event.schedule == '5 13 * * 0,2,4,6' && 'blog') || (github.event.schedule == '0 14 * * *' && 'github') || 'all' }}
        PLATFORMS: ${{ inputs.platforms || 'all' }}
        DRY_RUN: ${{ inputs.dry_run || 'false' }}
      run: node dist/index.js

    - name: Save Bot Memory State (Amnesia Protection)
      run: |
        git config --global user.name "SMM Bot Action"
        git config --global user.email "smm-bot-action@users.noreply.github.com"
        
        # Add the state files individually to prevent fatal errors if one is missing
        git add .last_post_id 2>/dev/null || true
        git add .last_github_release_id 2>/dev/null || true
        
        # Check if there are any changes to commit
        if ! git diff --staged --quiet; then
          git commit -m "chore: persist published state ids [skip ci]"
          git push
          echo "Successfully pushed updated memory state to repository."
        else
          echo "No new publications. Memory state remains unchanged."
        fi
